name: Update TryHackMe Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch TryHackMe Stats
        id: fetch
        run: |
          HTTP_STATUS=$(curl -s -o thm-stats.json -w "%{http_code}" \
            "https://tryhackme.com/api/v2/public-profile?username=Mistan" \
            -H "User-Agent: Mozilla/5.0" \
            -H "Accept: application/json" \
            --max-time 20)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "THM API returned HTTP $HTTP_STATUS — aborting to avoid overwriting good data"
            exit 1
          fi
          python3 -c "import json; d=json.load(open('thm-stats.json')); print('rank:', d['data']['rank'])"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add thm-stats.json
          if git diff --staged --quiet; then
            echo "THM stats unchanged — skipping commit"
            exit 0
          fi
          git commit -m "chore: update THM stats [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $attempt failed, retrying in 5s..."
            sleep 5
          done
