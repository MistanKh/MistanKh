name: Update TryHackMe Stats

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch TryHackMe Stats
        id: fetch
        run: |
          HTTP_STATUS=$(curl -sS -o thm-stats.tmp.json -w "%{http_code}" \
            "https://tryhackme.com/api/v2/public-profile?username=Mistan" \
            -H "User-Agent: Mozilla/5.0" \
            -H "Accept: application/json" \
            --max-time 20)

          if [ "$HTTP_STATUS" = "429" ]; then
            echo "THM API returned HTTP 429 rate limit. Keeping existing stats and ending successfully."
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "THM API returned HTTP $HTTP_STATUS. Keeping existing stats and ending successfully."
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("thm-stats.tmp.json").read_text())
          rank = data["data"]["rank"]
          print("rank:", rank)
          Path("thm-stats.json").write_text(json.dumps(data, separators=(",", ":")) + "\n")
          PY
          echo "updated=true" >> "$GITHUB_OUTPUT"

      - name: Commit & Push
        if: steps.fetch.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add thm-stats.json
          if git diff --staged --quiet; then
            echo "THM stats unchanged — skipping commit"
            exit 0
          fi
          git commit -m "chore: update THM stats [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $attempt failed, retrying in 5s..."
            sleep 5
          done
